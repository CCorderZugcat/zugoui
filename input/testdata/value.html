<html>
<head><title>value</title></head>
<body>

<form id="sandwich">
    <input id="field1" type="text" name="product" value="bread"/>
    <input id="field2" type="checkbox" name="toasted"/>
    <fieldset id="field3" name="cheese">
        <label for="cheddar">Cheddar</label>
        <input type="radio" name="cheese" value="cheddar"/>
        <label for="swiss">Swiss</label>
        <input type="radio" name="cheese" value="swiss" checked="true"/>
        <label for="shiny">Shiny</label>
        <input type="radio" name="cheese" value="shiny"/>
    </fieldset>
    <input id="field4" type="text" name="quantity"/>
    <div name="textme"></div>
</form>
</body>
</html>

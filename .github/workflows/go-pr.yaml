name: Go PR Checks

on: [pull_request]

jobs:
  check:
    name: 'golang check'
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    
    steps:
      - name: 'checkout'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - name: 'install Chrome'
        uses: browser-actions/setup-chrome@v2
        with:
          install-chromedriver: true

      - name: 'check go'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: |
          go mod tidy --diff
          gofmt -l -d .
          go test -v ./...
          ./go-test-js.sh -v ./...

<html>
    <head>
        <title>It All Goes To The Same Place</title>
    </head>
    <body>
        <form id="pizza">
            <fieldset name="size">
                <input id="small" type="radio" name="size" value="small"/>
                <label for="small">Small</label>
                <input id="medium" type="radio" name="size" value="medium"/>
                <label for="medium">Medium</label>
                <input id="large" type="radio" name="size" value="large"/>
                <label for="large">Large</label>
            </fieldset>
            <div>
                <input type="button" name="add" value="Add"/>
            </div>
            <div name="toppings">
                <input type="button" name="up" value="Up"/>
                <div name="0">
                    <label for="topping0">Topping</label>
                    <input id="topping0" name="topping" list="toppings"/>
                    <input type="button" name="remove" value="Remove"/>
                </div>
                <div name="1">
                    <label for="topping1">Topping</label>
                    <input id="topping1" name="topping" list="toppings"/>
                    <input type="button" name="remove" value="Remove"/>
                </div>
                <div name="2">
                    <label for="topping2">Topping</label>
                    <input id="topping2" name="topping" list="toppings"/>
                    <input type="button" name="remove" value="Remove"/>
                </div>
                <input type="button" name="down" value="Down"/>
            </div>
        </form>

        <datalist id="toppings">
            <option value="tuna fish"></option>
            <option value="peanut butter"></option>
            <option value="chocolate chips"></option>
            <option value="Nutella"></option>
            <option value="raisins"></option>
            <option value="eggs"></option>
            <option value="green olives"></option>
            <option value="broccoli"></option>
            <option value="onion powder"></option>
            <option value="rock salt"></option>
        </datalist>
    </body>
</html>
